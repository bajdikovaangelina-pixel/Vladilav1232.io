<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Poker Tournament Dashboard</title>
</head>
<body>
<div class="container">
    <!-- Верхняя панель -->
    <div class="top-bar">
        <h1>Main Event</h1>
        <p>Buyin 250$ | Buyin and Re-entry possible until level 7</p>
    </div>
    
    <!-- Левая секция -->
    <div class="left-section">
        <div><span>Players:</span> 16 / 21</div>
        <div><span>Re-Entries:</span> 4</div>
        <div><span>Chips in Play:</span> 375,000</div>
        <div><span>Average Stack:</span> 23,438</div>
    </div>
    
    <!-- Центральная секция -->
    <div class="center-section">
        <div><span>Level:</span> Level 1</div>
        <div><span>Blinds:</span> 10 / 20</div>
        <div><span>Antes:</span> 20</div>
        <div class="timer">07:01</div>
        <div><span>Next Blinds:</span> 20 / 40</div>
    </div>
    
    <!-- Правая секция -->
    <div class="right-section">
        <div><span>Prizepool:</span> $6,250</div>
        <div><span>Payouts:</span></div>
        <ul>
            <li>1. - $3,130</li>
            <li>2. - $1,870</li>
            <li>3. - $1,250</li>
        </ul>
    </div>
</div>
</body>
</html>
